version: "3.9"

services:
  app1:
    build: .
    container_name: flask_app1
    environment:
      APP_NAME: Container 1

  app2:
    build: .
    container_name: flask_app2
    environment:
      APP_NAME: Container 2

  nginx:
    image: nginx:latest
    container_name: nginx_lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2