<!DOCTYPE html>
<html>
<head>
<title>Docker Load Balancer Dashboard</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
margin-top:120px;
}

.card{
background:#1e293b;
width:420px;
margin:auto;
padding:40px;
border-radius:15px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

h1{
color:#38bdf8;
}

.info{
margin-top:20px;
font-size:20px;
}

.container{
color:#22c55e;
font-size:24px;
font-weight:bold;
}

.requests{
color:#facc15;
font-size:22px;
}

button{
margin-top:30px;
padding:12px 25px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

</style>
</head>

<body>

<div class="card">

<h1>Docker Load Balancer</h1>

<div class="info">
Handled By:
</div>

<div class="container">
{{container}}
</div>

<div class="info">
Total Requests
</div>

<div class="requests">
{{requests}}
</div>

<button onclick="location.reload()">Send New Request</button>

</div>

</body>
</html>
